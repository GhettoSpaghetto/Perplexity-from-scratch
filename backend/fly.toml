app = "perplexity-from-scratch"
primary_region = "bom"

[build]
  [build.args]
    BUN_VERSION = "latest"

[env]
  PORT = "3001"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1